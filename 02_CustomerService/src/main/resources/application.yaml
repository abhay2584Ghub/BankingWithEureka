spring:
    application:
        name: "CustomerService"
    datasource:
        username: root
        password: root123
        url: jdbc:mysql://localhost:3306/customer_db
        driver-class-name: com.mysql.cj.jdbc.Driver
    config:
        import: "optional:configserver:http://localhost:8787"
    profiles:
        active:
            - "prod"
logging:
    file:
        name: logs/customers.log

springdoc:
    api-docs:
        enabled: false
eureka:
    instance:
        prefer-ip-address: true
    client:
        fetch-registry: true
        register-with-eureka: true
        service-url:
            defaultZone: http://localhost:8070/eureka
