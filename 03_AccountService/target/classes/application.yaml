spring:
    application:
        name: "AccountService"
    datasource:
        username: root
        password: root123
        url: jdbc:mysql://localhost:3306/accounts_db
        driver-class-name: com.mysql.cj.jdbc.Driver
    profiles:
        active:
            - "prod"
    config:
        import: "optional:configserver:http://localhost:8787"
        profiles:
        active:
            - "prod"
springdoc:
    api-docs:
        enabled: false
server:
    port: 8181

logging:
    file:
        name: logs/account.log

eureka:
    instance:
        prefer-ip-address: true
    client:
        fetch-registry: true
        register-with-eureka: true
        service-url:
            defaultZone: http://localhost:8070/eureka
